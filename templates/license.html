{% extends 'base.html' %}
{% block content %}
<div class="row">
  <div class="col-md-6">
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <h5 class="card-title">Status da Licenca</h5>
        <p class="mb-1"><b>Serial:</b> {{ user.serial_key or 'Nao definido' }}</p>
        {% if user.license_valid() %}
          <p class="text-success mb-0"><b>Valida</b> - faltam {{ user.license_days_left() }} dia(s)</p>
        {% else %}
          <p class="text-danger mb-0"><b>Invalida/Expirada</b></p>
        {% endif %}
      </div>
    </div>
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Ativar Licenca</h5>
        <form method="post" action="{{ url_for('license.activate') }}">
          <div class="mb-3">
            <label class="form-label">Serial</label>
            <input name="serial" class="form-control" placeholder="username|YYYYMMDD|assinatura" required />
          </div>
          <button class="btn btn-primary">Ativar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
