{% extends 'base.html' %}
{% block content %}
<h2>Configuracao</h2>
<form method="post" class="row g-3">
  <div class="col-12">
    <h5>Plataforma</h5>
  </div>
  <div class="col-md-6">
    <label class="form-label">Login URL</label>
    <input class="form-control" name="login_url" value="{{ cfg.platform.login_url }}" />
  </div>
  <div class="col-md-6">
    <label class="form-label">Game URL</label>
    <input class="form-control" name="game_url" value="{{ cfg.platform.game_url }}" />
  </div>

  <div class="col-12">
    <h5>Credenciais do Cliente</h5>
  </div>
  <div class="col-md-4">
    <label class="form-label">Usuario</label>
    <input class="form-control" name="platform_username" value="{{ settings.platform_username if settings else '' }}" />
  </div>
  <div class="col-md-4">
    <label class="form-label">Senha</label>
    <input class="form-control" type="text" name="platform_password" value="{{ settings.platform_password if settings else '' }}" />
  </div>
  <div class="col-md-2 form-check" style="margin-top: 2rem;">
    <input class="form-check-input" type="checkbox" name="headless" id="headless" {% if settings and settings.headless %}checked{% endif %}>
    <label class="form-check-label" for="headless">Headless</label>
  </div>

  <div class="col-12">
    <h5>Estrategia</h5>
  </div>
  <div class="col-md-4">
    <label class="form-label">Nome da Estrategia</label>
    <input class="form-control" name="strategy_name" value="{{ cfg.strategy.name }}" />
  </div>
  <div class="col-md-4">
    <label class="form-label">Threshold</label>
    <input class="form-control" name="threshold" type="number" step="0.01" value="{{ cfg.strategy.threshold }}" />
  </div>
  <div class="col-md-4">
    <label class="form-label">Risco (%)</label>
    <input class="form-control" name="risk_percent" type="number" step="0.1" value="{{ cfg.strategy.risk_percent }}" />
  </div>
  <div class="col-md-4">
    <label class="form-label">Perdas seguidas (max)</label>
    <input class="form-control" name="max_consecutive_losses" type="number" value="{{ cfg.strategy.max_consecutive_losses }}" />
  </div>
  <div class="col-md-2">
    <label class="form-label">Intervalo (s)</label>
    <input class="form-control" name="interval_seconds" type="number" step="0.1" value="{{ cfg.bot.interval_seconds }}" />
  </div>

  <div class="col-12">
    <button class="btn btn-primary">Salvar</button>
  </div>
</form>
{% endblock %}
