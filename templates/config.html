{% extends 'base.html' %}
{% block content %}
<h2>Configuração</h2>
<form method="post" class="row g-3">
  <div class="col-md-4">
    <label class="form-label">Nome da Estratégia</label>
    <input class="form-control" name="strategy_name" value="{{ cfg.strategy.name }}" />
  </div>
  <div class="col-md-4">
    <label class="form-label">Threshold</label>
    <input class="form-control" name="threshold" type="number" step="0.01" value="{{ cfg.strategy.threshold }}" />
  </div>
  <div class="col-md-4">
    <label class="form-label">Risco (%)</label>
    <input class="form-control" name="risk_percent" type="number" step="0.1" value="{{ cfg.strategy.risk_percent }}" />
  </div>

  <div class="col-md-4">
    <label class="form-label">Perdas seguidas (máx)</label>
    <input class="form-control" name="max_consecutive_losses" type="number" value="{{ cfg.strategy.max_consecutive_losses }}" />
  </div>
  <div class="col-md-2">
    <label class="form-label">Intervalo (s)</label>
    <input class="form-control" name="interval_seconds" type="number" step="0.1" value="{{ cfg.bot.interval_seconds }}" />
  </div>

  <div class="col-12">
    <button class="btn btn-primary">Salvar</button>
    <a class="btn btn-outline-secondary" href="/script">Gerenciar Script</a>
  </div>
</form>
{% endblock %}
